name: PHP

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - develop
      - production
  pull_request:
    types:
      - opened
      - ready_for_review
      - synchronize
    # Only run on a given PR if relevant files have changed.
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - '.phpcs.xml.dist'

jobs:
  php:
    name: PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2.36.0
        with:
          php-version: 8.3
          coverage: none
          tools: composer

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        id: cache-php-dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: php-${{ runner.os }}-${{ matrix.php-version }}-${{ hashFiles('composer.lock') }}

      - name: Make Composer packages available globally
        run: echo "${PWD}/vendor/bin" >> $GITHUB_PATH

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --no-ansi

      - name: Lint code for PHP issues
        id: phpcs
        run: |
          composer lint -- --report-checkstyle=./phpcs-report.xml

      - name: Report PHPCS results
        if: always() && github.event_name == 'pull_request' && steps.phpcs.outcome == 'failure'
        run: |
          cat ./phpcs-report.xml | head
          cs2pr ./phpcs-report.xml
      
      - name: Run PHP unit tests
        run: |
          composer test
